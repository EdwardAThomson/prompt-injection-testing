input:
  path: prompts.txt         # or prompts.jsonl
  format: auto              # auto|txt|jsonl

output:
  dir: ./out
  write_csv: true
  write_jsonl: true

models:
  safety: gpt-5.4      # or any model via your library
  expand: gpt-5.4

llm:
  temperature: 0.0
  max_tokens: 256           # safety
  max_tokens_expand: 800    # expansion
  retry:
    attempts: 3
    backoff_sec: 2

run:
  stop_on_parse_error: false
  redact_in_report: false   # if true, hide prompt text in report

# Detector configuration (multi-detector pipeline)
# Use --detectors flag or this config to enable multiple detectors.
# When only llm_judge is enabled, the legacy single-detector pipeline runs.
detectors:
  enabled:
    - llm_judge              # default: existing LLM-based judge
    # - regex                # pattern matching (no API calls)
    # - bert                 # local transformer model (no API calls)
    # - weak_model           # cheap LLM pre-filter (no tool-call risk)
    # - scramblegate         # ScrambleGate stochastic gating

  # Per-detector configuration
  llm_judge: {}              # uses models.safety settings from above

  regex:
    risk_threshold: 0.5      # risk score >= this -> unsafe

  bert:
    model: protectai/deberta-v3-base-prompt-injection-v2
    mode: classification     # classification | similarity
    threshold: 0.5
    device: cpu              # cpu | cuda

  weak_model:
    model: gpt-5.4-mini      # cheap model with no tool-call capability
    temperature: 0.0

  scramblegate:
    scramble_mode: probabilistic  # probabilistic | broken_probabilistic | clean_only | masking_only | etc.
    risk_threshold: 0.75
    window_tokens: 800
    stride_tokens: 400
    views_per_window: 5
    use_llm_probe: true      # false = rules-only (no API calls)
